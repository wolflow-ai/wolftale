services:
  - type: web
    name: wolftale-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHONPATH
        value: .
    disk:
      name: wolftale-stores
      mountPath: /app/stores
      sizeGB: 1
